document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

k';color:#ece6d8\">Variantes — Capacidad del camión<\u002Fdiv>\n      <div style=\"font:400 13px/1.5 'Hanken Grotesk';color:#7e8fa3;margin-top:5px;max-width:540px\">El indicador estrella de la app. Dos formas de ver de un vistazo cuánto entra todavía en el camión.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:26px;align-items:flex-start\">\n\n      <!-- A barra -->\n      <div style=\"flex:none;width:330px\">\n        <div style=\"font:700 11px/1 'Hanken Grotesk';letter-spacing:.08em;text-transform:uppercase;color:#8595a8;margin-bottom:11px\">A · Barra (recomendada)<\u002Fdiv>\n        <div style=\"background:#141d2a;border:1px solid #223047;border-radius:16px;padding:15px\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:11px\"><span style=\"font:600 10px/1 'Hanken Grotesk';letter-spacing:.1em;text-transform:uppercase;color:#6b7f96\">Capacidad del camión<\u002Fspan><span style=\"font:700 11px/1 'Hanken Grotesk';color:#f0b343\">Casi lleno<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:11px\"><div style=\"flex:1;height:13px;background:#0a111c;border:1px solid #1c2636;border-radius:7px;overflow:hidden\"><div style=\"height:100%;width:80%;background:linear-gradient(90deg,#f0b343,#e0c264);border-radius:7px\"><\u002Fdiv><\u002Fdiv><span style=\"font:700 18px/1 'Space Grotesk';color:#f0b343\">80%<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;gap:7px;flex-wrap:wrap;margin-top:12px\"><span style=\"font:600 11px/1 'Hanken Grotesk';color:#a9b6c6;background:#0e1622;border:1px solid #223047;border-radius:7px;padding:6px 9px\">Autocons. 12tn <span style=\"color:#f0b343;font-weight:700;font-family:'Space Grotesk'\">4/5<\u002Fspan><\u002Fspan><span style=\"font:600 11px/1 'Hanken Grotesk';color:#a9b6c6;background:#0e1622;border:1px solid #223047;border-radius:7px;padding:6px 9px\">Autocons. 7tn <span style=\"color:#4fd389;font-weight:700;font-family:'Space Grotesk'\">2/8<\u002Fspan><\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- B anillo -->\n      <div style=\"flex:none;width:330px\">\n        <div style=\"font:700 11px/1 'Hanken Grotesk';letter-spacing:.08em;text-transform:uppercase;color:#8595a8;margin-bottom:11px\">B · Anillo<\u002Fdiv>\n        <div style=\"background:#141d2a;border:1px solid #223047;border-radius:16px;padding:15px;display:flex;align-items:center;gap:16px\">\n          <div style=\"position:relative;width:84px;height:84px;flex-shrink:0\">\n            <svg viewBox=\"0 0 100 100\" style=\"width:100%;height:100%;transform:rotate(-90deg)\"><circle cx=\"50\" cy=\"50\" r=\"42\" fill=\"none\" stroke=\"#0a111c\" stroke-width=\"11\"><\u002Fcircle><circle cx=\"50\" cy=\"50\" r=\"42\" fill=\"none\" stroke=\"#f0b343\" stroke-width=\"11\" stroke-linecap=\"round\" stroke-dasharray=\"264\" stroke-dashoffset=\"53\"><\u002Fcircle><\u002Fsvg>\n            <div style=\"position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center\"><span style=\"font:700 22px/1 'Space Grotesk';color:#f0b343\">80%<\u002Fspan><span style=\"font:600 9px/1 'Hanken Grotesk';color:#6b7f96;margin-top:3px\">lleno<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"flex:1\">\n            <div style=\"font:700 13px/1 'Hanken Grotesk';color:#f0b343;margin-bottom:9px\">Casi lleno<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:6px\">\n              <div style=\"display:flex;justify-content:space-between;font:600 11.5px/1 'Hanken Grotesk';color:#a9b6c6\"><span>Autocons. 12tn<\u002Fspan><span style=\"color:#f0b343;font-family:'Space Grotesk';font-weight:700\">4/5<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;justify-content:space-between;font:600 11.5px/1 'Hanken Grotesk';color:#a9b6c6\"><span>Autocons. 7tn<\u002Fspan><span style=\"color:#4fd389;font-family:'Space Grotesk';font-weight:700\">2/8<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { screen:'inicio', view:'tarjetas', filter:'', cli:'Heinrich Wall', toast:'' };\n\n  EST = {\n    'Confirmado':       {c:'#4fd389', bg:'rgba(79,211,137,.13)'},\n    'En producción':    {c:'#f0b343', bg:'rgba(240,179,67,.13)'},\n    'Listo para entregar':{c:'#b79cf0', bg:'rgba(183,156,240,.13)'},\n    'En camino':        {c:'#5aa9f0', bg:'rgba(90,169,240,.13)'},\n    'Entregado':        {c:'#5fe0a0', bg:'rgba(95,224,160,.13)'},\n  };\n\n  RAW = [\n    {id:'v1', cliente:'Heinrich Wall', tel:'2954-501234', tipo:'a', modelo:'100TN', cant:2, localidad:'General Acha', precio:9500000, cp:6100000, cf:720000, estado:'Listo para entregar', fecha:'26 jun'},\n    {id:'v2', cliente:'Juan Klassen', tel:'2952-447781', tipo:'a', modelo:'50TN', cant:1, localidad:'Guatraché', precio:4200000, cp:2700000, cf:0, estado:'En producción', fecha:'2 jul'},\n    {id:'v3', cliente:'Coop. Agrícola La Pampa', tel:'2954-330090', tipo:'c', modelo:'12tn', cant:1, localidad:'Santa Rosa', precio:2800000, cp:1750000, cf:240000, estado:'Confirmado', fecha:'5 jul'},\n    {id:'v4', cliente:'Estancia El Cruce', tel:'2953-415566', tipo:'c', modelo:'18tn Alero', cant:1, localidad:'Macachín', precio:3600000, cp:2200000, cf:310000, estado:'En camino', fecha:'24 jun'},\n    {id:'v5', cliente:'Pedro Friesen', tel:'2954-228841', tipo:'a', modelo:'30TN', cant:1, localidad:'Bernasconi', precio:2400000, cp:1500000, cf:180000, estado:'Entregado', fecha:'18 jun'},\n    {id:'v6', cliente:'Agro Sur SRL', tel:'2334-509912', tipo:'c', modelo:'7tn', cant:3, localidad:'Eduardo Castex', precio:1900000, cp:1200000, cf:0, estado:'Confirmado', fecha:'8 jul'},\n    {id:'v7', cliente:'Heinrich Wall', tel:'2954-501234', tipo:'a', modelo:'30TN', cant:1, localidad:'General Acha', precio:2300000, cp:1450000, cf:160000, estado:'Entregado', fecha:'12 may'},\n  ];\n\n  VIAJES = [\n    {id:'t1', nombre:'Ruta Sur · 24 jun', fecha:'24 jun', pct:80, color:'#f0b343', color2:'#e0c264', capLabel:'Casi lleno', meta:'3 paradas · 420 km reales', publico:true,\n      modelos:[{label:'Autocons. 12tn', ratio:'4/5', col:'#f0b343'},{label:'Autocons. 7tn', ratio:'2/8', col:'#4fd389'}],\n      paradas:[{n:1, cliente:'Estancia El Cruce', sub:'Autoconsumo 18tn · Macachín'},{n:2, cliente:'Coop. Agrícola La Pampa', sub:'Autoconsumo 12tn · Santa Rosa'},{n:3, cliente:'Agro Sur SRL', sub:'Autoconsumo 7tn ×3 · E. Castex'}]},\n    {id:'t2', nombre:'General Acha · 26 jun', fecha:'26 jun', pct:100, color:'#f06a6a', color2:'#f08a6a', capLabel:'Lleno', meta:'1 parada · 180 km reales', publico:false,\n      modelos:[{label:'Silo Aéreo 100TN', ratio:'2/2', col:'#f06a6a'}],\n      paradas:[{n:1, cliente:'Heinrich Wall', sub:'Silo Aéreo 100TN ×2 · General Acha'}]},\n  ];\n\n  PUBLICOS = [\n    {id:'p1', nombre:'Ruta Oeste', vendedor:'Carlos M.', meta:'25 jun · 380 km reales · 3 paradas', cliente:'Juan Klassen', cliLoc:'Guatraché'},\n    {id:'p2', nombre:'Norte de Córdoba', vendedor:'Sofía R.', meta:'28 jun · 510 km reales · 4 paradas', cliente:'Agro Sur SRL', cliLoc:'Eduardo Castex'},\n  ];\n\n  fmt(n){ return '$'+Number(n).toLocaleString('es-AR'); }\n  fmtM(n){ return '$'+(n/1e6).toFixed(1).replace('.',',')+'M'; }\n  prodLabel(t){ return t==='a'?'SILO AÉREO':'AUTOCONSUMO'; }\n  prodColors(t){ return t==='a'?{c:'#5aa9f0',bg:'rgba(90,169,240,.13)'}:{c:'#f0b343',bg:'rgba(240,179,67,.13)'}; }\n\n  toast(msg){\n    this.setState({toast:msg});\n    clearTimeout(this._tt);\n    this._tt = setTimeout(()=>this.setState({toast:''}), 1900);\n  }\n\n  ventaVM(v){\n    const e = this.EST[v.estado];\n    const pc = this.prodColors(v.tipo);\n    const gan = v.precio - v.cp - v.cf;\n    return {\n      id:v.id, cliente:v.cliente, modelo:v.modelo, localidad:v.localidad,\n      precio:this.fmt(v.precio), ganancia:(gan>=0?'+':'−')+this.fmt(Math.abs(gan)).slice(1),\n      gcol: gan>=0?'#4fd389':'#f06a6a',\n      cant:'×'+v.cant, cantShow: v.cant>1?'inline-block':'none',\n      prodLabel:this.prodLabel(v.tipo), pcol:pc.c, pbg:pc.bg,\n      estado:v.estado, color:e.c, bg:e.bg, fecha:'Entrega '+v.fecha,\n      sub:(v.tipo==='a'?'Silo Aéreo':'Autoconsumo')+' '+v.modelo+' · '+v.localidad,\n      compactSub:(v.tipo==='a'?'Silo':'Autoc.')+' '+v.modelo+' · '+v.localidad,\n      onEdit:()=>this.toast('Abriendo ficha de '+v.cliente+'…'),\n      onWa:()=>this.toast('WhatsApp a '+v.cliente),\n    };\n  }\n\n  chip(label, key){\n    const on = this.state.filter===key;\n    return { label, color:on?'#1a130a':'#9fb0c4', bg:on?'#e3c46a':'#141d2a', bd:on?'#e3c46a':'#243246',\n      onClick:()=>this.setState({filter:key}) };\n  }\n\n  cliChip(name){\n    const on = this.state.cli===name;\n    const short = name.length>14?name.split(' ')[0]+' '+(name.split(' ')[1]||''):name;\n    return { label:short, color:on?'#1a130a':'#9fb0c4', bg:on?'#e3c46a':'#141d2a', bd:on?'#e3c46a':'#243246',\n      onClick:()=>this.setState({cli:name}) };\n  }\n\n  cliDetail(name){\n    const vs = this.RAW.filter(v=>v.cliente===name);\n    const tot = vs.reduce((s,v)=>s+v.precio,0);\n    const tcp = vs.reduce((s,v)=>s+v.cp,0);\n    const tcf = vs.reduce((s,v)=>s+v.cf,0);\n    const gan = tot-tcp-tcf;\n    return {\n      nombre:name, tel:vs[0]?.tel||'—',\n      ventas:vs.length, entregadas:vs.filter(v=>v.estado==='Entregado').length,\n      facturado:this.fmtM(tot), precio:this.fmt(tot), costoP:this.fmt(tcp), costoF:this.fmt(tcf),\n      ganancia:this.fmt(gan), margen:tot>0?((gan/tot)*100).toFixed(0)+'%':'0%',\n      historial: vs.map(v=>{\n        const e=this.EST[v.estado]; const g=v.precio-v.cp-v.cf;\n        return { titulo:(v.tipo==='a'?'Silo Aéreo':'Autoconsumo')+' '+v.modelo+(v.cant>1?' ×'+v.cant:''),\n          sub:v.localidad+' · '+this.fmt(v.precio), ganancia:this.fmt(g), gcol:g>=0?'#4fd389':'#f06a6a',\n          estado:v.estado, color:e.c, bg:e.bg };\n      }),\n    };\n  }\n\n  navCol(s){ return this.state.screen===s?'#e3c46a':'#5c7188'; }\n  navBar(s){ return this.state.screen===s?'#e3c46a':'transparent'; }\n  vis(s){ return this.state.screen===s?'flex':'none'; }\n\n  renderVals(){\n    const fil = this.state.filter;\n    const ventas = this.RAW.filter(v=> !fil || v.estado===fil);\n    const ventasF = ventas.map(v=>this.ventaVM(v));\n    const pend = this.RAW.filter(v=>v.estado!=='Entregado').slice(0,4).map(v=>this.ventaVM(v));\n    const total = ventas.length;\n    const seen = [];\n    const cliNames = this.RAW.map(v=>v.cliente).filter(n=>{ if(seen.includes(n))return false; seen.push(n); return true; });\n\n    return {\n      hoy:'domingo 22 de junio',\n      saludo:'Buenas tardes, Hernán',\n\n      visInicio:this.vis('inicio'), visVentas:this.vis('ventas'), visFlete:this.vis('flete'),\n      visClientes:this.vis('clientes'), visPublico:this.vis('publico'),\n\n      navInicio:this.navCol('inicio'), navVentas:this.navCol('ventas'), navFlete:this.navCol('flete'),\n      navClientes:this.navCol('clientes'), navPublico:this.navCol('publico'),\n      navBarInicio:this.navBar('inicio'), navBarVentas:this.navBar('ventas'), navBarFlete:this.navBar('flete'),\n      navBarClientes:this.navBar('clientes'), navBarPublico:this.navBar('publico'),\n\n      toInicio:()=>this.setState({screen:'inicio'}),\n      toVentas:()=>this.setState({screen:'ventas'}),\n      toFlete:()=>this.setState({screen:'flete'}),\n      toClientes:()=>this.setState({screen:'clientes'}),\n      toPublico:()=>this.setState({screen:'publico'}),\n      toNueva:()=>this.toast('Nueva venta'),\n      toSimular:()=>this.setState({screen:'flete'}),\n\n      pendientes:pend,\n      viajes:this.VIAJES,\n      publicos:this.PUBLICOS.map(p=>({...p, onSumar:()=>this.toast(p.cliente+' sumado a '+p.nombre)})),\n\n      chips:[ this.chip('Todos',''), this.chip('Confirmado','Confirmado'), this.chip('Producción','En producción'),\n        this.chip('Listo','Listo para entregar'), this.chip('En camino','En camino'), this.chip('Entregado','Entregado') ],\n      countLabel: total+(total===1?' venta':' ventas')+(this.RAW.length!==total?' de '+this.RAW.length:''),\n      ventasF,\n\n      setTarjetas:()=>this.setState({view:'tarjetas'}),\n      setCompacta:()=>this.setState({view:'compacta'}),\n      visTarjetas:this.state.view==='tarjetas'?'flex':'none',\n      visCompacta:this.state.view==='compacta'?'flex':'none',\n      vtA_c:this.state.view==='tarjetas'?'#1a130a':'#9fb0c4', vtA_bg:this.state.view==='tarjetas'?'#e3c46a':'transparent',\n      vtB_c:this.state.view==='compacta'?'#1a130a':'#9fb0c4', vtB_bg:this.state.view==='compacta'?'#e3c46a':'transparent',\n\n      cliChips:cliNames.map(n=>this.cliChip(n)),\n      cli:this.cliDetail(this.state.cli),\n      toastWa:()=>this.toast('WhatsApp a '+this.state.cli),\n      toastDespub:()=>this.toast('Viaje despublicado'),\n      toast2:()=>this.toast('Crear nuevo viaje'),\n      toast3:()=>this.toast('Copiado para WhatsApp ✓'),\n      toast4:()=>this.toast('Buscando clientes cercanos…'),\n      toast5:()=>this.toast('Ruta optimizada: 420 km ⚡'),\n\n      toastShow:this.state.toast?'block':'none',\n      toastMsg:this.state.toast,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
