<head>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0d1520;color:#ddd8ce;height:100vh;display:flex;flex-direction:column;overflow:hidden}
nav{background:#0a1018;border-bottom:2px solid #c9a840;display:flex;align-items:center;padding:0 16px;height:48px;flex-shrink:0;gap:4px}
.nav-logo{font-size:.95rem;font-weight:900;color:#c9a840;letter-spacing:2px;text-transform:uppercase;margin-right:16px}
.nav-logo span{color:#7a9ab8;font-weight:400;font-size:.75rem;letter-spacing:0}
.ntab{background:none;border:none;color:#5a7a9a;font-size:.8rem;font-weight:600;padding:8px 14px;border-radius:6px 6px 0 0;cursor:pointer;font-family:inherit;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.ntab:hover{color:#ddd8ce;background:#1a2c40}
.ntab.on{color:#c9a840;border-bottom-color:#c9a840;background:#111820}
.nav-right{margin-left:auto}
.page{display:none;flex:1;overflow:hidden;flex-direction:column}
.page.on{display:flex}

/* VENTAS */
.vbar{background:#111820;border-bottom:1px solid #1e3245;padding:10px 16px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;flex-shrink:0}
.vbar input,.vbar select{background:#1a2c40;border:1px solid #1e3a55;color:#ddd8ce;border-radius:6px;padding:6px 10px;font-size:.8rem;font-family:inherit}
.vbar input{width:210px}
.vtable-wrap{flex:1;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:.8rem}
thead{position:sticky;top:0;background:#111820;z-index:10}
th{padding:9px 12px;text-align:left;color:#5a7a9a;font-size:.67rem;text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid #1e3245;font-weight:700}
td{padding:9px 12px;border-bottom:1px solid #1a2a3a;vertical-align:middle}
tr:hover td{background:#1a2c40}
.etag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.67rem;font-weight:700;white-space:nowrap}
.e0{background:#1a3a20;color:#5adf8a}.e1{background:#3a2800;color:#ffc040}.e2{background:#2a1a40;color:#c0a0ff}.e3{background:#0d2e4a;color:#5ab8ff}.e4{background:#1a3a1a;color:#40df40}
.ptag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:.67rem;font-weight:700}
.pa{background:#0d2e4a;color:#5ab8ff}.pc{background:#3a2800;color:#ffc040}
.act-btns{display:flex;gap:4px}
.ab{background:none;border:none;padding:4px 6px;border-radius:4px;cursor:pointer;font-size:.82rem;color:#3a5a7a;transition:all .15s}
.ab:hover{color:#ddd8ce;background:#1e3245}.ab.del:hover{color:#ff6060;background:#2a1010}
.empty-row td{text-align:center;color:#3a5a7a;padding:40px}

/* MAPA */
#mapVentas{flex:1}

/* FLETE */
.flete-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden}
.flete-top{flex:1;display:flex;overflow:hidden;min-height:0}
#mapFlete{flex:1;min-width:0}
.flete-zonas{width:360px;min-width:300px;background:#0d1520;border-left:1px solid #1e3245;display:flex;flex-direction:column;overflow:hidden}
.fz-header{padding:10px 14px;border-bottom:1px solid #1e3245;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.fz-title{font-size:.67rem;font-weight:800;text-transform:uppercase;letter-spacing:1.4px;color:#c9a840}
.fz-cols{flex:1;overflow-x:auto;overflow-y:hidden;display:flex}
.fz-col{min-width:200px;max-width:220px;border-right:1px solid #1e3245;display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.fz-col-hdr{padding:8px 11px;background:#111820;border-bottom:1px solid #1e3245;flex-shrink:0}
.fz-col-name{font-size:.74rem;font-weight:800;color:#c9a840;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fz-col-meta{font-size:.65rem;color:#5a7a9a;margin-top:1px}
.fz-list{flex:1;overflow-y:auto;padding:5px}
.fz-item{background:#1a2c40;border:1px solid #1e3a55;border-radius:7px;padding:6px 8px;margin-bottom:4px;display:flex;gap:6px;cursor:pointer;transition:all .15s}

.fz-cb{width:14px;height:14px;accent-color:#c9a840;cursor:pointer;flex-shrink:0;margin-top:3px}

.cd-stat{background:#1a2c40;border:1px solid #1e3a55;border-radius:8px;padding:10px 15px}
.cd-sv{font-size:1.2rem;font-weight:900;color:#c9a840}
.cd-sl{font-size:.67rem;color:#5a7a9a;margin-top:1px}
.cd-vrow{background:#1a2c40;border:1px solid #1e3a55;border-radius:7px;padding:9px 12px;margin-bottom:6px;display:flex;align-items:center;gap:10px}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:5000;align-items:center;justify-content:center}
.overlay.on{display:flex}
.modal{background:#15202e;border:1px solid #c9a840;border-radius:12px;padding:22px;width:95%;max-width:520px;max-height:92vh;overflow-y:auto;box-shadow:0 16px 48px rgba(0,0,0,.7)}
.modal h2{font-size:.95rem;color:#c9a840;margin-bottom:14px}
.fg{margin-bottom:10px}
.fg label{display:block;font-size:.67rem;color:#7a9ab8;margin-bottom:3px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.fg input,.fg select,.fg textarea{width:100%;background:#1a2c40;border:1px solid #1e3a55;color:#ddd8ce;border-radius:6px;padding:7px 10px;font-size:.83rem;font-family:inherit;transition:border-color .15s}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:#c9a840}
.fg textarea{resize:vertical;min-height:48px}
.frow{display:flex;gap:10px}.frow .fg{flex:1}
.mmap{height:185px;border-radius:8px;overflow:hidden;border:1px solid #1e3a55;margin-bottom:4px}
.mmhint{font-size:.71rem;color:#5a7a9a;margin-bottom:9px}
.mact{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}

button{border:none;cursor:pointer;border-radius:6px;font-size:.8rem;font-weight:600;padding:7px 14px;transition:all .15s;font-family:inherit}
.bg{background:#c9a840;color:#111820}.bg:hover{background:#dfc060}
.bd{background:#1e3245;color:#ddd8ce;border:1px solid #2e4a65}.bd:hover{background:#2a4560}
.bv{background:#1a5230;color:#9fe;border:1px solid #2a8c50}.bv:hover{background:#236840}
.br{background:#4a1515;color:#fcc;border:1px solid #8a2020}.br:hover{background:#6a2020}

.sugs-box{position:absolute;z-index:9999;background:#1a2c40;border:1px solid #c9a840;border-radius:6px;width:100%;max-height:140px;overflow-y:auto}
.sugs-box div{padding:7px 10px;cursor:pointer;font-size:.8rem;color:#ddd8ce}
.sugs-box div:hover{background:#243d56}

#toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#15202e;border:1px solid #c9a840;color:#c9a840;padding:8px 18px;border-radius:20px;font-size:.78rem;z-index:9999;font-weight:600;transition:opacity .3s;pointer-events:none;opacity:0}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:#0d1520}::-webkit-scrollbar-thumb{background:#1e3a55;border-radius:3px}
</style>
</head>

<script>
// ── CONFIG ───────────────────────────────────────────────────────
const SB_URL='https://ahympdvzytatwlgzvyoh.supabase.co';
const SB_KEY='sb_publishable__iKag8gJWXztsMIkEBhdcQ_W9dB1oTV';

async function sbFetch(path,method='GET',body=null){
  const opts={method,headers:{'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Prefer':'return=representation'}};
  if(body)opts.body=JSON.stringify(body);
  const r=await fetch(SB_URL+path,opts);
  if(!r.ok)throw new Error(await r.text());
  const t=await r.text();return t?JSON.parse(t):[];
}

// ── TONELAJES ────────────────────────────────────────────────────
const TONS={
  a:['6TN','10TN','16TN','22TN','28TN','30TN','40TN','50TN','60TN','62TN','72TN','80TN','100TN','120TN','140TN','150TN','175TN','200TN'],
  c:['2TN','4TN','7TN','12TN','18TN']
};
function cargarTonelajes(valorActual){
  const prod=document.getElementById('fProd').value;
  const sel=document.getElementById('fMod');
  sel.innerHTML='<option value="">-- Seleccioná --</option>'+
    TONS[prod].map(t=>`<option${t===valorActual?' selected':''}>${t}</option>`).join('');
}

// ── CIUDADES ─────────────────────────────────────────────────────
const CIU={"cordoba":[-31.4135,-64.1811],"general deheza":[-33.0372,-63.7626],"rio cuarto":[-33.1307,-64.3499],"villa maria":[-32.4072,-63.2398],"san francisco":[-31.4278,-62.0847],"bell ville":[-32.6275,-62.6878],"marcos juarez":[-32.6987,-62.1039],"laboulaye":[-34.1278,-63.3918],"rio tercero":[-32.1730,-64.1085],"la carlota":[-33.4189,-63.2969],"monte maiz":[-33.2447,-62.5997],"general cabrera":[-32.8122,-63.8701],"hernando":[-32.4269,-63.7351],"oncativo":[-31.9131,-63.6878],"leones":[-32.6597,-62.2997],"arias":[-33.6358,-62.3997],"corral de bustos":[-33.2833,-62.1833],"noetinger":[-32.3797,-62.3147],"monte buey":[-32.9153,-62.4597],"adelia maria":[-33.6356,-64.0356],"vicuna mackenna":[-33.9128,-64.3856],"jovita":[-34.5714,-63.9531],"general levalle":[-34.0189,-63.9297],"elena":[-33.5689,-63.7314],"alta gracia":[-31.6561,-64.4292],"villa carlos paz":[-31.4219,-64.4978],"dean funes":[-30.4219,-64.3499],"arroyito":[-31.4278,-63.0439],"rosario":[-32.9468,-60.6393],"santa fe":[-31.6333,-60.7000],"rafaela":[-31.2500,-61.4833],"casilda":[-33.0461,-61.1667],"venado tuerto":[-33.7457,-61.9681],"canada de gomez":[-32.8195,-61.3928],"rufino":[-34.2694,-62.7167],"firmat":[-33.4574,-61.4872],"armstrong":[-32.7833,-61.6000],"las rosas":[-32.4770,-61.5802],"sunchales":[-30.9447,-61.5606],"esperanza":[-31.4481,-60.9314],"reconquista":[-29.1456,-59.6436],"buenos aires":[-34.6037,-58.3816],"la plata":[-34.9205,-57.9536],"mar del plata":[-38.0023,-57.5575],"bahia blanca":[-38.7183,-62.2663],"tandil":[-37.3213,-59.1335],"pergamino":[-33.8930,-60.5618],"junin":[-34.5928,-60.9456],"olavarria":[-36.8924,-60.3226],"nueve de julio":[-35.4451,-60.8824],"trenque lauquen":[-35.9724,-62.7279],"san nicolas":[-33.3281,-60.2086],"zarate":[-34.0983,-59.0267],"lujan":[-34.5669,-59.1150],"tres arroyos":[-38.3756,-60.2758],"santa rosa":[-36.6233,-64.2847],"general pico":[-35.6561,-63.7575],"general acha":[-37.3756,-64.6014],"mendoza":[-32.8908,-68.8272],"san rafael":[-34.6175,-68.3302],"san luis":[-33.2950,-66.3356],"parana":[-31.7322,-60.5244],"concordia":[-31.3928,-58.0200],"gualeguaychu":[-33.0117,-58.5119],"tucuman":[-26.8253,-65.2227],"salta":[-24.7859,-65.4117],"neuquen":[-38.9516,-68.0591],"bariloche":[-41.1456,-71.3081],"san martin de los andes":[-40.1572,-71.3536],"corrientes":[-27.4806,-58.8341],"resistencia":[-27.4514,-58.9870],"posadas":[-27.3667,-55.8961]};
const norm=s=>(s||'').toLowerCase().trim().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,' ');
function geoLocal(q){const n=norm(q);for(const[k,v]of Object.entries(CIU))if(norm(k)===n)return v;for(const[k,v]of Object.entries(CIU))if(norm(k).startsWith(n)||n.startsWith(norm(k)))return v;for(const[k,v]of Object.entries(CIU))if(norm(k).includes(n))return v;return null}

function sugerirLoc(val){
  const box=document.getElementById('locSugs');
  if(!val||val.length<2){box.innerHTML='';return}
  const q=norm(val),hits=Object.keys(CIU).filter(k=>norm(k).includes(q)).slice(0,6);
  if(!hits.length){box.innerHTML='';return}
  const d=document.createElement('div');d.className='sugs-box';
  d.innerHTML=hits.map(k=>`<div onclick="elegirLoc('${k}')">${k.charAt(0).toUpperCase()+k.slice(1)}</div>`).join('');
  box.innerHTML='';box.appendChild(d);
}
function elegirLoc(k){
  document.getElementById('fLoc').value=k.charAt(0).toUpperCase()+k.slice(1);
  document.getElementById('locSugs').innerHTML='';
  const c=CIU[k];if(!c||!modalMap)return;
  modalMap.setView(c,11);
  if(modalPin)modalPin.setLatLng(c);
  else{modalPin=L.marker(c,{draggable:true}).addTo(modalMap);modalPin.on('dragend',e=>{const l=e.target.getLatLng();modalLat=l.lat;modalLng=l.lng})}
  modalLat=c[0];modalLng=c[1];
}

// ── ESTADO ───────────────────────────────────────────────────────
const ESTADOS=['Confirmado','En producción','Listo para entregar','En camino','Entregado'];
const ECLASES=['e0','e1','e2','e3','e4'];
const ECOLORS=['#5adf8a','#ffc040','#c0a0ff','#5ab8ff','#40df40'];
const FLT=-33.0372,FLN=-63.7626,FACTOR=1.35;
let ventas=[],editId=null;
let modalMap=null,modalPin=null,modalLat=null,modalLng=null;
let mapV=null,vMarkers=[];
let mapF=null,fMK={},fRL=null;
let fleteSelIds=new Set();
let cliSel=null;

// ── NAVEGACIÓN ───────────────────────────────────────────────────
function ir(pg){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.ntab').forEach(t=>t.classList.remove('on'));
  document.getElementById('page-'+pg).classList.add('on');
  document.querySelectorAll('.ntab').forEach(t=>{if(t.textContent.toLowerCase().includes(pg.slice(0,4)))t.classList.add('on')});
  if(pg==='mapa'){initMapV();actualizarMapV()}
  if(pg==='flete'){initMapF();renderFleteZonas()}
  if(pg==='clientes')renderClientes();
}

// ── SUPABASE ─────────────────────────────────────────────────────
async function cargarVentas(){
  try{ventas=await sbFetch('/rest/v1/ventas?select=*&order=created_at.desc');renderVentas();renderFleteZonas();renderClientes();actualizarMapV()}
  catch(e){toast('Error: '+e.message)}
}
async function guardarVenta(){
  const cli=document.getElementById('fCli').value.trim();
  if(!cli){document.getElementById('fCli').style.borderColor='#ff6060';return}
  const loc=document.getElementById('fLoc').value.trim();
  let lat=modalLat,lng=modalLng;
  if(!lat&&loc){const c=geoLocal(loc);if(c){lat=c[0];lng=c[1]}}
  const data={
    cliente:cli,telefono:document.getElementById('fTel').value.trim()||null,
    producto:document.getElementById('fProd').value,
    modelo:document.getElementById('fMod').value||null,
    precio:parseFloat(document.getElementById('fPrecio').value)||null,
    moneda:'ARS',estado:document.getElementById('fEstado').value,
    fecha_entrega:document.getElementById('fFecha').value||null,
    localidad:loc||null,zona:document.getElementById('fZona').value.trim()||null,
    notas:document.getElementById('fNot').value.trim()||null,
    lat:lat||null,lng:lng||null
  };
  try{
    if(editId)await sbFetch('/rest/v1/ventas?id=eq.'+editId,'PATCH',data);
    else await sbFetch('/rest/v1/ventas','POST',data);
    toast(editId?'Actualizado ✔':'Guardado ✔');cerrarModal();cargarVentas();
  }catch(e){toast('Error: '+e.message)}
}
async function eliminarVenta(id){
  if(!confirm('¿Eliminar?'))return;
  try{await sbFetch('/rest/v1/ventas?id=eq.'+id,'DELETE');toast('Eliminada');cargarVentas()}catch(e){toast('Error')}
}
async function cambiarEstado(id,estado){
  try{await sbFetch('/rest/v1/ventas?id=eq.'+id,'PATCH',{estado});cargarVentas()}catch(e){}
}

// ── RENDER VENTAS ─────────────────────────────────────────────────
function renderVentas(){
  const q=norm(document.getElementById('buscar').value);
  const est=document.getElementById('filtroE').value;
  const prod=document.getElementById('filtroP').value;
  const f=ventas.filter(v=>{
    if(q&&!norm(v.cliente).includes(q)&&!norm(v.localidad||'').includes(q)&&!norm(v.zona||'').includes(q))return false;
    if(est&&v.estado!==est)return false;
    if(prod&&v.producto!==prod)return false;
    return true;
  });
  document.getElementById('vCount').textContent=f.length+' registro'+(f.length!==1?'s':'');
  const tb=document.getElementById('vtbody');
  if(!f.length){tb.innerHTML='<tr class="empty-row"><td colspan="7">Sin resultados</td></tr>';return}
  tb.innerHTML=f.map(v=>{
    const ei=Math.max(0,ESTADOS.indexOf(v.estado));
    const pn=v.producto==='a'?'Silo Aéreo':'Autoconsumo';
    const fecha=v.fecha_entrega?new Date(v.fecha_entrega+'T12:00').toLocaleDateString('es-AR',{day:'2-digit',month:'short'}):'—';
    return `<tr>
      <td><div style="font-weight:700">${v.cliente}</div>${v.telefono?`<div style="color:#5ab8ff;font-size:.75rem">📞 ${v.telefono}</div>`:''}</td>
      <td><span class="ptag ${v.producto==='a'?'pa':'pc'}">${pn}</span>${v.modelo?`<div style="font-size:.7rem;color:#7a9ab8;margin-top:2px">${v.modelo}</div>`:''}</td>
      <td><div style="color:#7a9ab8;font-size:.78rem">${v.localidad||'—'}</div>${v.zona?`<div style="color:#c9a840;font-size:.7rem;font-weight:600">📦 ${v.zona}</div>`:''}</td>
      <td style="font-weight:700;color:#c9a840">${v.precio?'$'+Number(v.precio).toLocaleString('es-AR'):'—'}</td>
      <td><select onchange="cambiarEstado('${v.id}',this.value)" style="background:transparent;border:none;font-size:.67rem;font-weight:700;cursor:pointer;font-family:inherit;color:inherit" class="${ECLASES[ei]} etag">
        ${ESTADOS.map(e=>`<option${e===v.estado?' selected':''}>${e}</option>`).join('')}
      </select></td>
      <td style="color:#7a9ab8;font-size:.75rem">${fecha}</td>
      <td><div class="act-btns">
        <button class="ab" onclick="abrirEditar('${v.id}')">✎</button>
        <button class="ab" onclick="wa('${v.telefono||''}')">💬</button>
        <button class="ab del" onclick="eliminarVenta('${v.id}')">✕</button>
      </div></td>
    </tr>`;
  }).join('');
}

// ── MODAL ─────────────────────────────────────────────────────────
function limpiarModal(){
  ['fCli','fTel','fPrecio','fFecha','fLoc','fZona','fNot'].forEach(i=>document.getElementById(i).value='');
  document.getElementById('fCli').style.borderColor='';
  document.getElementById('fProd').value='a';
  document.getElementById('fEstado').value='Confirmado';
  cargarTonelajes('');
  modalLat=null;modalLng=null;
  if(modalPin){modalPin.remove();modalPin=null}
}
function abrirNueva(){
  editId=null;
  document.getElementById('modalTitle').textContent='Nueva venta';
  limpiarModal();
  document.getElementById('overlay').classList.add('on');
  setTimeout(()=>{initModalMap();document.getElementById('fCli').focus()},150);
}
function abrirEditar(id){
  const v=ventas.find(x=>x.id===id);if(!v)return;
  editId=id;modalLat=v.lat;modalLng=v.lng;
  document.getElementById('modalTitle').textContent='Editar venta';
  document.getElementById('fCli').value=v.cliente||'';
  document.getElementById('fCli').style.borderColor='';
  document.getElementById('fTel').value=v.telefono||'';
  document.getElementById('fProd').value=v.producto||'a';
  cargarTonelajes(v.modelo||'');
  document.getElementById('fPrecio').value=v.precio||'';
  document.getElementById('fEstado').value=v.estado||'Confirmado';
  document.getElementById('fFecha').value=v.fecha_entrega||'';
  document.getElementById('fLoc').value=v.localidad||'';
  document.getElementById('fZona').value=v.zona||'';
  document.getElementById('fNot').value=v.notas||'';
  modalLat=v.lat;modalLng=v.lng;
  document.getElementById('overlay').classList.add('on');
  setTimeout(()=>{
    initModalMap();
    if(v.lat&&v.lng){
      modalMap.setView([v.lat,v.lng],11);
      modalPin=L.marker([v.lat,v.lng],{draggable:true}).addTo(modalMap);
      modalPin.on('dragend',e=>{const l=e.target.getLatLng();modalLat=l.lat;modalLng=l.lng});
    }
  },150);
}
function cerrarModal(){document.getElementById('overlay').classList.remove('on');editId=null}
document.addEventListener('keydown',e=>{if(e.key==='Escape')cerrarModal()});

function initModalMap(){
  const el=document.getElementById('modalMap');
  if(modalMap){modalMap.remove();modalMap=null}
  modalMap=L.map(el).setView([FLT,FLN],7);
  L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}',{maxZoom:20,subdomains:['mt0','mt1','mt2','mt3']}).addTo(modalMap);
  L.tileLayer('https://mt1.google.com/vt/lyrs=h&x={x}&y={y}&z={z}',{maxZoom:20,opacity:.9,subdomains:['mt0','mt1','mt2','mt3']}).addTo(modalMap);
  modalMap.on('click',e=>{
    modalLat=e.latlng.lat;modalLng=e.latlng.lng;
    if(modalPin)modalPin.setLatLng(e.latlng);
    else{modalPin=L.marker(e.latlng,{draggable:true}).addTo(modalMap);modalPin.on('dragend',ev=>{const l=ev.target.getLatLng();modalLat=l.lat;modalLng=l.lng})}
  });
}

// ── MAPA VENTAS ───────────────────────────────────────────────────
function initMapV(){
  if(mapV)return;
  mapV=L.map('mapVentas').setView([-33.5,-63],7);
  L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}',{maxZoom:20,subdomains:['mt0','mt1','mt2','mt3']}).addTo(mapV);
  L.tileLayer('https://mt1.google.com/vt/lyrs=h&x={x}&y={y}&z={z}',{maxZoom:20,opacity:.9,subdomains:['mt0','mt1','mt2','mt3']}).addTo(mapV);
}
function actualizarMapV(){
  if(!mapV)return;
  vMarkers.forEach(m=>m.remove());vMarkers=[];
  ventas.filter(v=>v.lat&&v.lng).forEach(v=>{
    const ei=Math.max(0,ESTADOS.indexOf(v.estado));
    const ic=L.divIcon({html:`<div style="width:13px;height:13px;border-radius:50%;background:${ECOLORS[ei]};border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.5)"></div>`,className:'',iconAnchor:[7,7]});
    vMarkers.push(L.marker([v.lat,v.lng],{icon:ic}).addTo(mapV).bindPopup(`<b style="color:#c9a840">${v.cliente}</b><br>${v.producto==='a'?'Silo Aéreo':'Autoconsumo'}${v.modelo?' · '+v.modelo:''}<br><span style="color:#888">${v.localidad||''}${v.zona?' · '+v.zona:''}</span><br>${v.estado}`));
  });
}

// ── FLETE ─────────────────────────────────────────────────────────
function renderFleteZonas(){
  const pend=ventas.filter(v=>v.estado!=='Entregado'&&v.lat&&v.lng);
  const zonas={};
  pend.forEach(v=>{const z=v.zona||'__';if(!zonas[z])zonas[z]=[];zonas[z].push(v)});
  const keys=Object.keys(zonas).sort((a,b)=>a==='__'?1:b==='__'?-1:a.localeCompare(b));
  const cont=document.getElementById('fzCols');cont.innerHTML='';
  if(!keys.length){cont.innerHTML='<div style="padding:24px;color:#3a5a7a;font-size:.8rem;text-align:center;width:100%">No hay pedidos pendientes con ubicación</div>';return}
  keys.forEach(z=>{
    const items=zonas[z];
    const sel=items.filter(v=>fleteSelIds.has(v.id));
    const km=sel.length?Math.round(calcKmLista(sel)):0;
    const col=document.createElement('div');col.className='fz-col';
    col.innerHTML=`<div class="fz-col-hdr">
      <div class="fz-col-name">${z==='__'?'Sin zona':z}</div>
      <div class="fz-col-meta">${items.length} pedido${items.length!==1?'s':''}${sel.length?' · <span style="color:#3a8a5a">'+km+' km sel.</span>':''}</div>
    </div>
    <div class="fz-list">${items.map(v=>`
      <div class="fz-item${fleteSelIds.has(v.id)?' sel':''}" onclick="toggleFlete('${v.id}')">
        <input type="checkbox" class="fz-cb"${fleteSelIds.has(v.id)?' checked':''} onclick="event.stopPropagation();toggleFlete('${v.id}')"/>
        <div style="min-width:0">
          <div class="fz-cli">${v.cliente}</div>
          <div class="fz-sub">${v.producto==='a'?'Aéreo':'Autocons.'}${v.modelo?' · '+v.modelo:''}</div>
          <div class="fz-sub">${v.localidad||''}</div>
        </div>
      </div>`).join('')}</div>`;
    cont.appendChild(col);
  });
  // stats
  const selAll=ventas.filter(v=>fleteSelIds.has(v.id)&&v.lat&&v.lng);
  document.getElementById('fleteKm').textContent=selAll.length?Math.round(calcKmLista(selAll)).toLocaleString('es-AR'):'0';
  document.getElementById('fzSel').textContent=selAll.length+' sel.';
  actualizarMapF();
}
function toggleFlete(id){
  if(fleteSelIds.has(id))fleteSelIds.delete(id);else fleteSelIds.add(id);
  renderFleteZonas();
}
function calcKmLista(arr){
  let km=0,p={lat:FLT,lng:FLN};
  arr.forEach(v=>{km+=dk(p.lat,p.lng,v.lat,v.lng)*FACTOR;p={lat:v.lat,lng:v.lng}});
  return km+dk(p.lat,p.lng,FLT,FLN)*FACTOR;
}
function initMapF(){
  if(mapF)return;
  mapF=L.map('mapFlete').setView([FLT,FLN],7);
  L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}',{maxZoom:20,subdomains:['mt0','mt1','mt2','mt3']}).addTo(mapF);
  L.tileLayer('https://mt1.google.com/vt/lyrs=h&x={x}&y={y}&z={z}',{maxZoom:20,opacity:.9,subdomains:['mt0','mt1','mt2','mt3']}).addTo(mapF);
  L.marker([FLT,FLN],{icon:L.divIcon({html:'<div style="background:#c9a840;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.9rem;box-shadow:0 2px 8px rgba(0,0,0,.6)">🏭</div>',className:'',iconAnchor:[15,15]})}).addTo(mapF).bindTooltip('Remeco · Gral. Deheza');
}
function actualizarMapF(){
  if(!mapF)return;
  Object.values(fMK).forEach(m=>m.remove());fMK={};
  if(fRL){fRL.remove();fRL=null}
  const sel=ventas.filter(v=>fleteSelIds.has(v.id)&&v.lat&&v.lng);
  sel.forEach((v,i)=>{
    const col=v.producto==='a'?'#5ab8ff':'#ffc040';
    const ic=L.divIcon({html:`<div style="position:relative"><div style="width:28px;height:28px;border-radius:50%;background:#0d1520;border:2.5px solid ${col};display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:900;color:${col}">${i+1}</div></div>`,className:'',iconAnchor:[14,14]});
    fMK[v.id]=L.marker([v.lat,v.lng],{icon:ic}).addTo(mapF).bindPopup(`<b>${v.cliente}</b><br>${v.localidad||''}${v.zona?'<br>'+v.zona:''}`);
  });
  if(sel.length){
    const pts=[[FLT,FLN],...sel.map(v=>[v.lat,v.lng]),[FLT,FLN]];
    fRL=L.polyline(pts,{color:'#f0c840',weight:3,opacity:.9,dashArray:'8,5'}).addTo(mapF);
    mapF.fitBounds(L.latLngBounds(pts),{padding:[40,40]});
  }
}
function optimizarFlete(){
  const sel=ventas.filter(v=>fleteSelIds.has(v.id)&&v.lat&&v.lng);
  if(sel.length<2){toast('Seleccioná al menos 2 paradas');return}
  const d=[...sel],opt=[];let a={lat:FLT,lng:FLN};
  while(d.length){let mi=Infinity,mI=0;d.forEach((v,i)=>{const dd=dk(a.lat,a.lng,v.lat,v.lng);if(dd<mi){mi=dd;mI=i}});const s=d.splice(mI,1)[0];opt.push(s);a={lat:s.lat,lng:s.lng}}
  fleteSelIds=new Set(opt.map(v=>v.id));renderFleteZonas();toast('Optimizado ⚡');
}
function exportarFlete(){
  const sel=ventas.filter(v=>fleteSelIds.has(v.id)&&v.lat&&v.lng);
  if(!sel.length){alert('Seleccioná paradas primero');return}
  let txt=`FLETE – REMECO\n${new Date().toLocaleDateString('es-AR',{day:'2-digit',month:'long',year:'numeric'})}\nSalida: Gral. Deheza\n\n`;
  sel.forEach((v,i)=>{
    const prev=i===0?{lat:FLT,lng:FLN}:sel[i-1];
    txt+=`${i+1}. ${v.cliente}\n   ${v.producto==='a'?'Silo Aéreo':'Autoconsumo'}${v.modelo?' – '+v.modelo:''}\n`;
    if(v.localidad)txt+=`   📍 ${v.localidad}${v.zona?' ('+v.zona+')':''}\n`;
    txt+=`   +${Math.round(dk(prev.lat,prev.lng,v.lat,v.lng)*FACTOR)} km\n`;
    if(v.notas)txt+=`   📝 ${v.notas}\n`;
    txt+='\n';
  });
  txt+=`TOTAL: ${Math.round(calcKmLista(sel)).toLocaleString('es-AR')} km`;
  navigator.clipboard.writeText(txt).then(()=>toast('Copiado ✔')).catch(()=>{const w=window.open('','_blank');w.document.write('<pre style="padding:16px">'+txt+'</pre>')});
}

// ── CLIENTES ─────────────────────────────────────────────────────
function renderClientes(){
  const m={};
  ventas.forEach(v=>{if(!m[v.cliente])m[v.cliente]={n:v.cliente,tel:v.telefono,vs:[]};m[v.cliente].vs.push(v)});
  const lista=Object.values(m).sort((a,b)=>a.n.localeCompare(b.n));
  document.getElementById('cliList').innerHTML=lista.map(c=>`<div class="cli-item${cliSel===c.n?' sel':''}" onclick="verCli('${c.n.replace(/'/g,"\\'")}')">
    <div class="cli-name">${c.n}</div>
    ${c.tel?`<div class="cli-tel">📞 ${c.tel}</div>`:''}
    <div class="cli-cnt">${c.vs.length} venta${c.vs.length!==1?'s':''}</div>
  </div>`).join('');
  if(cliSel)verCli(cliSel);
}
function verCli(nombre){
  cliSel=nombre;
  document.querySelectorAll('.cli-item').forEach(el=>el.classList.toggle('sel',el.querySelector('.cli-name')?.textContent===nombre));
  const cvs=ventas.filter(v=>v.cliente===nombre);
  const tel=cvs[0]?.telefono||'';
  const total=cvs.reduce((s,v)=>s+(v.precio||0),0);
  const ent=cvs.filter(v=>v.estado==='Entregado').length;
  document.getElementById('cliDetail').innerHTML=`
    <div class="cd-name">${nombre}</div>
    ${tel?`<div style="color:#5ab8ff;font-size:.85rem;margin-top:4px;margin-bottom:14px">📞 <a href="tel:${tel}" style="color:#5ab8ff;text-decoration:none">${tel}</a> <button class="bg" style="padding:3px 10px;font-size:.72rem;margin-left:8px" onclick="wa('${tel}')">WhatsApp</button></div>`:'<div style="height:14px"></div>'}
    <div class="cd-stats">
      <div class="cd-stat"><div class="cd-sv">${cvs.length}</div><div class="cd-sl">ventas</div></div>
      <div class="cd-stat"><div class="cd-sv">${ent}</div><div class="cd-sl">entregadas</div></div>
      ${total>0?`<div class="cd-stat"><div class="cd-sv">$${total.toLocaleString('es-AR')}</div><div class="cd-sl">facturado</div></div>`:''}
    </div>
    <div style="font-size:.72rem;font-weight:700;color:#5a7a9a;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Historial</div>
    ${cvs.map(v=>{
      const ei=Math.max(0,ESTADOS.indexOf(v.estado));
      const fecha=v.created_at?new Date(v.created_at).toLocaleDateString('es-AR',{day:'2-digit',month:'short',year:'numeric'}):'';
      return `<div class="cd-vrow">
        <div style="flex:1;min-width:0">
          <div style="font-weight:700;font-size:.83rem">${v.producto==='a'?'Silo Aéreo':'Autoconsumo'}${v.modelo?' · '+v.modelo:''}</div>
          <div style="font-size:.72rem;color:#7a9ab8">${v.localidad||''}${v.zona?' · '+v.zona:''}${fecha?' · '+fecha:''}</div>
          ${v.notas?`<div style="font-size:.7rem;color:#f0c040;margin-top:2px">${v.notas}</div>`:''}
        </div>
        <div style="text-align:right;flex-shrink:0">
          <span class="${ECLASES[ei]} etag">${v.estado}</span>
          ${v.precio?`<div style="font-size:.8rem;font-weight:700;color:#c9a840;margin-top:4px">$${Number(v.precio).toLocaleString('es-AR')}</div>`:''}
        </div>
      </div>`;
    }).join('')}`;
}

// ── HELPERS ───────────────────────────────────────────────────────
function wa(tel){if(!tel){alert('Sin teléfono');return}window.open('https://wa.me/54'+tel.replace(/\D/g,''),'_blank')}
function dk(a,b,c,d){const R=6371,r=Math.PI/180,dL=(c-a)*r,dl=(d-b)*r,x=Math.sin(dL/2)**2+Math.cos(a*r)*Math.cos(c*r)*Math.sin(dl/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.opacity='1';clearTimeout(t._t);t._t=setTimeout(()=>t.style.opacity='0',2500)}

cargarVentas();
</script>
