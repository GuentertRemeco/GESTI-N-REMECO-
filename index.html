<script>
const SB_URL='https://ahympdvzytatwlgzvyoh.supabase.co';
const SB_KEY='sb_publishable__iKag8gJWXztsMIkEBhdcQ_W9dB1oTV';
const FLT=-37.574897,FLN=-63.842515,FACTOR=1.35;
const TONS={a:['6TN','10TN','16TN','22TN','28TN','30TN','40TN','50TN','60TN','62TN','72TN','80TN','100TN','120TN','140TN','150TN','175TN','200TN'],c:['2TN','4TN','7TN','12TN','18TN']};
const ESTADOS=['Confirmado','En producción','Listo para entregar','En camino','Entregado'];
const ECLASES=['e0','e1','e2','e3','e4'];
const ECOLORS=['#5adf8a','#ffc040','#c0a0ff','#5ab8ff','#40df40'];

async function sbFetch(p,m='GET',b=null){
  const o={method:m,headers:{'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Prefer':'return=representation'}};
  if(b)o.body=JSON.stringify(b);
  const r=await fetch(SB_URL+p,o);
  if(!r.ok)throw new Error(await r.text());
  const t=await r.text();return t?JSON.parse(t):[];
}

function cargarTons(v){const p=document.getElementById('fProd').value;const s=document.getElementById('fMod');s.innerHTML='<option value="">-- Seleccioná --</option>'+TONS[p].map(t=>`<option${t===v?' selected':''}>${t}</option>`).join('')}

let ventas=[],editId=null;
let gMapV=null,gMapF=null,gMapSim=null,gMapModal=null;
let gDir=null,gDirRF=null,gDirRS=null;
let gMkModal=null,modalLat=null,modalLng=null;
let gMkV=[],gMkF=[];
let simParadas=[];
let viajes=JSON.parse(localStorage.getItem('remeco_viajes')||'[]');
let cliSel=null,acModal=null,acSim=null;

function initGoogle(){
  gDir=new google.maps.DirectionsService();
  const pg=document.querySelector('.page.on')?.id;
  if(pg==='page-mapa')initMapV();
  if(pg==='page-flete')initMapF();
  if(pg==='page-simular')initMapSim();
}

const MBASE={mapTypeId:'hybrid',mapTypeControl:true,fullscreenControl:false,streetViewControl:false};

function fabMk(map){
  return new google.maps.Marker({
    position:{lat:FLT,lng:FLN},map,title:'Remeco',zIndex:100,
    icon:{url:'data:image/svg+xml;charset=UTF-8,'+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="36" height="36"><circle cx="18" cy="18" r="16" fill="#c9a840" stroke="#fff" stroke-width="2"/><text x="18" y="23" text-anchor="middle" font-size="16">🏭</text></svg>'),scaledSize:new google.maps.Size(36,36),anchor:new google.maps.Point(18,18)}
  });
}

function ir(pg){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.ntab').forEach(t=>t.classList.remove('on'));
  document.getElementById('page-'+pg).classList.add('on');
  document.querySelectorAll('.ntab').forEach(t=>{if(t.textContent.toLowerCase().includes(pg==='simular'?'sim':pg.slice(0,4)))t.classList.add('on')});
  if(pg==='mapa'){initMapV();actualizarMapV()}
  if(pg==='flete'){initMapF();renderViajes()}
  if(pg==='simular')initMapSim();
  if(pg==='clientes')renderClientes();
}

async function cargarVentas(){
  try{ventas=await sbFetch('/rest/v1/ventas?select=*&order=created_at.desc');renderVentas();renderClientes();actualizarMapV()}
  catch(e){toast('Error: '+e.message)}
}

async function guardarVenta(){
  const cli=document.getElementById('fCli').value.trim();
  if(!cli){document.getElementById('fCli').style.borderColor='#ff6060';return}
  const data={
    cliente:cli,telefono:document.getElementById('fTel').value.trim()||null,
    cuit:document.getElementById('fCuit').value.trim()||null,
    producto:document.getElementById('fProd').value,
    modelo:document.getElementById('fMod').value||null,
    precio:parseFloat(document.getElementById('fPrecio').value)||null,
    moneda:'ARS',estado:document.getElementById('fEstado').value,
    fecha_entrega:document.getElementById('fFecha').value||null,
    localidad:document.getElementById('fLoc').value.trim()||null,
    zona:document.getElementById('fZona').value.trim()||null,
    notas:document.getElementById('fNot').value.trim()||null,
    lat:modalLat||null,lng:modalLng||null
  };
  try{
    if(editId)await sbFetch('/rest/v1/ventas?id=eq.'+editId,'PATCH',data);
    else await sbFetch('/rest/v1/ventas','POST',data);
    toast(editId?'Actualizado ✔':'Guardado ✔');cerrarModal();cargarVentas();
  }catch(e){toast('Error: '+e.message)}
}

async function eliminarVenta(id){if(!confirm('¿Eliminar?'))return;try{await sbFetch('/rest/v1/ventas?id=eq.'+id,'DELETE');toast('Eliminada');cargarVentas()}catch(e){}}
async function cambiarEstado(id,e){try{await sbFetch('/rest/v1/ventas?id=eq.'+id,'PATCH',{estado:e});cargarVentas()}catch(e){}}

function renderVentas(){
  const q=norm(document.getElementById('buscar').value);
  const est=document.getElementById('filtroE').value;
  const prod=document.getElementById('filtroP').value;
  const f=ventas.filter(v=>{
    if(q&&!norm(v.cliente).includes(q)&&!norm(v.localidad||'').includes(q)&&!norm(v.zona||'').includes(q))return false;
    if(est&&v.estado!==est)return false;
    if(prod&&v.producto!==prod)return false;
    return true;
  });
  document.getElementById('vCount').textContent=f.length+' registro'+(f.length!==1?'s':'');
  const tb=document.getElementById('vtbody');
  if(!f.length){tb.innerHTML='<tr class="empty-row"><td colspan="7">Sin resultados</td></tr>';return}
  tb.innerHTML=f.map(v=>{
    const ei=Math.max(0,ESTADOS.indexOf(v.estado));
    const fecha=v.fecha_entrega?new Date(v.fecha_entrega+'T12:00').toLocaleDateString('es-AR',{day:'2-digit',month:'short'}):'—';
    return `<tr>
      <td><div style="font-weight:700">${v.cliente}</div>${v.telefono?`<div style="color:#5ab8ff;font-size:.75rem">📞 ${v.telefono}</div>`:''}${v.cuit?`<div style="color:#7a9ab8;font-size:.72rem">CUIT: ${v.cuit}</div>`:''}</td>
      <td><span class="ptag ${v.producto==='a'?'pa':'pc'}">${v.producto==='a'?'Silo Aéreo':'Autoconsumo'}</span>${v.modelo?`<div style="font-size:.7rem;color:#7a9ab8;margin-top:2px">${v.modelo}</div>`:''}</td>
      <td><div style="color:#7a9ab8;font-size:.78rem">${v.localidad||'—'}</div>${v.zona?`<div style="color:#c9a840;font-size:.7rem;font-weight:600">📦 ${v.zona}</div>`:''}</td>
      <td style="font-weight:700;color:#c9a840">${v.precio?'$'+Number(v.precio).toLocaleString('es-AR'):'—'}</td>
      <td><select onchange="cambiarEstado('${v.id}',this.value)" style="background:transparent;border:none;font-size:.67rem;font-weight:700;cursor:pointer;font-family:inherit;color:inherit" class="${ECLASES[ei]} etag">${ESTADOS.map(e=>`<option${e===v.estado?' selected':''}>${e}</option>`).join('')}</select></td>
      <td style="color:#7a9ab8;font-size:.75rem">${fecha}</td>
      <td><div class="act-btns">
        <button class="ab" onclick="abrirEditar('${v.id}')">✎</button>
        <button class="ab" onclick="wa('${v.telefono||''}')">💬</button>
        <button class="ab del" onclick="eliminarVenta('${v.id}')">✕</button>
      </div></td>
    </tr>`;
  }).join('');
}

}
function abrirNueva(){

  acModal=new google.maps.places.Autocomplete(document.getElementById('fLoc'),{componentRestrictions:{country:'ar'},fields:['geometry','name']});
  acModal.addListener('place_changed',()=>{
    const p=acModal.getPlace();
    if(p.geometry){const l=p.geometry.location;modalLat=l.lat();modalLng=l.lng();gMapModal.setCenter(l);gMapModal.setZoom(12);if(gMkModal)gMkModal.setMap(null);gMkModal=new google.maps.Marker({position:l,map:gMapModal,draggable:true});gMkModal.addListener('dragend',e=>{modalLat=e.latLng.lat();modalLng=e.latLng.lng()})}
  });
  gMapModal.addListener('click',e=>{modalLat=e.latLng.lat();modalLng=e.latLng.lng();if(gMkModal)gMkModal.setMap(null);gMkModal=new google.maps.Marker({position:e.latLng,map:gMapModal,draggable:true});gMkModal.addListener('dragend',ev=>{modalLat=ev.latLng.lat();modalLng=ev.latLng.lng()})});

function saveViajes(){localStorage.setItem('remeco_viajes',JSON.stringify(viajes))}
function abrirNuevoViaje(){document.getElementById('viajeNombre').value='';document.getElementById('viajeFecha').value='';document.getElementById('overlayViaje').classList.add('on');setTimeout(()=>document.getElementById('viajeNombre').focus(),100)}
function cerrarNuevoViaje(){document.getElementById('overlayViaje').classList.remove('on')}
function crearViaje(){
  const nom=document.getElementById('viajeNombre').value.trim();
  if(!nom){document.getElementById('viajeNombre').style.borderColor='#ff6060';return}
  viajes.push({id:uid(),nombre:nom,fecha:document.getElementById('viajeFecha').value||null,pedidoIds:[],expandido:true});
  saveViajes();cerrarNuevoViaje();renderViajes();toast('Viaje creado ✔');
}

function renderViajes(){
  const body=document.getElementById('fpBody');
  if(!viajes.length){body.innerHTML='<div style="text-align:center;padding:30px;color:#3a5a7a;font-size:.8rem">Creá un viaje y agregá los pedidos</div>';return}
  const disp=ventas.filter(v=>v.lat&&v.lng&&v.estado!=='Entregado');
  const asig=new Set(viajes.flatMap(x=>x.pedidoIds));
  body.innerHTML=viajes.map(vj=>{
    const peds=disp.filter(v=>vj.pedidoIds.includes(v.id));
    const libres=disp.filter(v=>!asig.has(v.id));
    const kmStr=vj._kmReal?vj._kmReal.toLocaleString('es-AR')+' km reales':peds.length?Math.round(calcKm(peds)).toLocaleString('es-AR')+' km est.':'0 km';
    const fStr=vj.fecha?new Date(vj.fecha+'T12:00').toLocaleDateString('es-AR',{day:'2-digit',month:'short'}):'';
    return `<div class="viaje-card">
      <div class="viaje-header">
        <button class="viaje-collapse" onclick="toggleViaje('${vj.id}')">${vj.expandido?'▲':'▼'}</button>
        <div class="viaje-info">
          <div class="viaje-nombre">🚛 ${vj.nombre}</div>
          <div class="viaje-meta"><span>${peds.length} parada${peds.length!==1?'s':''}</span><span class="viaje-km">${kmStr}</span>${fStr?`<span>📅 ${fStr}</span>`:''}</div>
        </div>
        <div class="viaje-btns">
          <button class="vbtn" onclick="verEnMapa('${vj.id}')">🗺️</button>
          <button class="vbtn del" onclick="eliminarViaje('${vj.id}')">✕</button>
        </div>
      </div>
      ${vj.expandido?`<div class="viaje-body">
        ${peds.length?peds.map((v,i)=>`<div class="vp-item"><div class="vp-num">${i+1}</div><div class="vp-info"><div class="vp-cli">${v.cliente}</div><div class="vp-sub">${v.producto==='a'?'Aéreo':'Autocons.'}${v.modelo?' · '+v.modelo:''} · ${v.localidad||''}</div></div><button class="vp-del" onclick="quitarPedido('${vj.id}','${v.id}')">✕</button></div>`).join(''):'<div style="font-size:.73rem;color:#3a5a7a;padding:4px">Sin pedidos aún</div>'}
        ${libres.length?`<div class="agregar-section"><div class="agregar-title">+ Agregar pedido</div><div class="pedidos-disponibles">${libres.map(v=>`<div class="pd-item" onclick="agregarPedido('${vj.id}','${v.id}')"><div class="pd-info"><div class="pd-cli">${v.cliente}</div><div class="pd-sub">${v.producto==='a'?'Aéreo':'Autocons.'}${v.modelo?' · '+v.modelo:''} · ${v.localidad||''}</div></div><span style="font-size:.7rem;color:#c9a840;font-weight:700">+ agregar</span></div>`).join('')}</div></div>`:''}
        <div class="viaje-actions">
          <button class="bv" style="flex:1;font-size:.73rem;padding:5px" onclick="exportarViaje('${vj.id}')">📋 Exportar</button>
          <button class="bd" style="font-size:.73rem;padding:5px" onclick="optimizarViaje('${vj.id}')">⚡ Optimizar</button>
        </div>
      </div>`:''}
    </div>`;
  }).join('');
}

function toggleViaje(id){const v=viajes.find(x=>x.id===id);if(!v)return;v.expandido=!v.expandido;saveViajes();renderViajes()}
function eliminarViaje(id){if(!confirm('¿Eliminar?'))return;viajes=viajes.filter(x=>x.id!==id);saveViajes();renderViajes()}
function agregarPedido(vid,pid){const v=viajes.find(x=>x.id===vid);if(!v||v.pedidoIds.includes(pid))return;v.pedidoIds.push(pid);saveViajes();renderViajes()}
function quitarPedido(vid,pid){const v=viajes.find(x=>x.id===vid);if(!v)return;v.pedidoIds=v.pedidoIds.filter(x=>x!==pid);delete v._kmReal;saveViajes();renderViajes()}
function optimizarViaje(id){
  const vj=viajes.find(x=>x.id===id);if(!vj)return;
  const sel=ventas.filter(v=>vj.pedidoIds.includes(v.id)&&v.lat&&v.lng);
  if(sel.length<2){toast('Necesitás al menos 2 paradas');return}
  const d=[...sel],opt=[];let a={lat:FLT,lng:FLN};
  while(d.length){let mi=Infinity,mI=0;d.forEach((v,i)=>{const dd=dk(a.lat,a.lng,v.lat,v.lng);if(dd<mi){mi=dd;mI=i}});const s=d.splice(mI,1)[0];opt.push(s);a={lat:s.lat,lng:s.lng}}
  vj.pedidoIds=opt.map(v=>v.id);delete vj._kmReal;saveViajes();renderViajes();toast('Optimizado ⚡');
}

function verEnMapa(id){
  if(!gMapF||!gDir){toast('Entrá a la pestaña Flete primero');return}
  const vj=viajes.find(x=>x.id===id);if(!vj)return;
  const sel=ventas.filter(v=>vj.pedidoIds.includes(v.id)&&v.lat&&v.lng);
  if(!sel.length){toast('No hay pedidos con ubicación');return}
  gMkF.forEach(m=>m.setMap(null));gMkF=[];
  sel.forEach((v,i)=>{
    const m=new google.maps.Marker({position:{lat:v.lat,lng:v.lng},map:gMapF,label:{text:String(i+1),color:'#fff',fontWeight:'bold'},title:v.cliente,zIndex:50});
    const iw=new google.maps.InfoWindow({content:`<b>${v.cliente}</b><br>${v.localidad||''}`});
    m.addListener('click',()=>iw.open(gMapF,m));gMkF.push(m);
  });
  toast('Calculando ruta Google Maps...');
  const last=sel[sel.length-1];
  gDir.route({
    origin:{lat:FLT,lng:FLN},
    destination:{lat:last.lat,lng:last.lng},
    waypoints:sel.slice(0,-1).map(v=>({location:{lat:v.lat,lng:v.lng},stopover:true})),
    travelMode:google.maps.TravelMode.DRIVING
  },(result,status)=>{
    if(status==='OK'){
      gDirRF.setDirections(result);
      const km=Math.round(result.routes[0].legs.reduce((s,l)=>s+l.distance.value,0)/1000);
      vj._kmReal=km;saveViajes();renderViajes();
      const b=new google.maps.LatLngBounds();
      b.extend({lat:FLT,lng:FLN});sel.forEach(v=>b.extend({lat:v.lat,lng:v.lng}));
      gMapF.fitBounds(b);
      toast(`Google Maps: ${km.toLocaleString('es-AR')} km ✔`);
    }else toast('Error Google: '+status);
  });
}

function calcKm(arr){let km=0,p={lat:FLT,lng:FLN};arr.forEach(v=>{km+=dk(p.lat,p.lng,v.lat,v.lng)*FACTOR;p={lat:v.lat,lng:v.lng}});return km}

function exportarViaje(id){
  const vj=viajes.find(x=>x.id===id);if(!vj)return;
  const sel=ventas.filter(v=>vj.pedidoIds.includes(v.id)&&v.lat&&v.lng);
  if(!sel.length){alert('Sin pedidos');return}
  const f=vj.fecha?new Date(vj.fecha+'T12:00').toLocaleDateString('es-AR',{day:'2-digit',month:'long',year:'numeric'}):'';
  let t=`VIAJE: ${vj.nombre}${f?' – '+f:''}\nSalida: Metalúrgica Remeco\n\n`;
  sel.forEach((v,i)=>{
    const p=i===0?{lat:FLT,lng:FLN}:sel[i-1];
    t+=`${i+1}. ${v.cliente}${v.cuit?' (CUIT: '+v.cuit+')':''}\n   ${v.producto==='a'?'Silo Aéreo':'Autoconsumo'}${v.modelo?' – '+v.modelo:''}\n`;
    if(v.localidad)t+=`   📍 ${v.localidad}\n`;
    t+=`   +${Math.round(dk(p.lat,p.lng,v.lat,v.lng)*FACTOR)} km\n`;
    if(v.notas)t+=`   📝 ${v.notas}\n`;t+='\n';
  });
  if(vj._kmReal)t+=`TOTAL: ${vj._kmReal.toLocaleString('es-AR')} km`;
  navigator.clipboard.writeText(t).then(()=>toast('Copiado ✔')).catch(()=>{const w=window.open('','_blank');w.document.write('<pre style="padding:16px">'+t+'</pre>')});
}
function exportarViajes(){
  const act=viajes.filter(v=>v.pedidoIds.length);if(!act.length){alert('Sin viajes');return}
  let t='';
  act.forEach(vj=>{
    const sel=ventas.filter(v=>vj.pedidoIds.includes(v.id)&&v.lat&&v.lng);if(!sel.length)return;
    const f=vj.fecha?new Date(vj.fecha+'T12:00').toLocaleDateString('es-AR',{day:'2-digit',month:'short'}):'';
    t+=`═══ ${vj.nombre}${f?' ('+f+')':''} ═══\n`;
    sel.forEach((v,i)=>{t+=`${i+1}. ${v.cliente} – ${v.producto==='a'?'Silo Aéreo':'Autoconsumo'}${v.modelo?' '+v.modelo:''}${v.localidad?' – '+v.localidad:''}\n`});
    if(vj._kmReal)t+=`Total: ${vj._kmReal.toLocaleString('es-AR')} km\n`;t+='\n';
  });
  navigator.clipboard.writeText(t).then(()=>toast('Copiado ✔')).catch(()=>{const w=window.open('','_blank');w.document.write('<pre style="padding:16px">'+t+'</pre>')});
}

function initMapSim(){
  if(gMapSim||!window.google)return;
  gMapSim=new google.maps.Map(document.getElementById('mapSimular'),{...MBASE,center:{lat:FLT,lng:FLN},zoom:6});
  fabMk(gMapSim);
  gDirRS=new google.maps.DirectionsRenderer({polylineOptions:{strokeColor:'#c9a840',strokeWeight:5,strokeOpacity:.95},suppressMarkers:true,map:gMapSim});
  acSim=new google.maps.places.Autocomplete(document.getElementById('simInput'),{componentRestrictions:{country:'ar'},fields:['geometry','name']});
  acSim.addListener('place_changed',()=>{
    const p=acSim.getPlace();
    if(p.geometry){
      const l=p.geometry.location;
      simParadas.push({nombre:p.name||'',lat:l.lat(),lng:l.lng()});
      document.getElementById('simInput').value='';
      renderSimParadas();dibujarSimMapa();
    }
  });
}

function renderSimParadas(){
  const b=document.getElementById('simBody');
  if(!simParadas.length){b.innerHTML='<div style="text-align:center;padding:24px;color:#3a5a7a;font-size:.8rem">Escribí una localidad arriba</div>';document.getElementById('simKm').textContent='0';return}
  let km=0,prev={lat:FLT,lng:FLN};
  b.innerHTML=simParadas.map((p,i)=>{const d=Math.round(dk(prev.lat,prev.lng,p.lat,p.lng)*FACTOR);km+=d;prev=p;return `<div class="sim-parada"><div class="sim-num">${i+1}</div><div class="sim-info"><div class="sim-lugar">${p.nombre}</div><div class="sim-km">+${d} km desde ${i===0?'fábrica':simParadas[i-1].nombre}</div></div><button class="sim-del" onclick="quitarSim(${i})">✕</button></div>`}).join('');
  document.getElementById('simKm').textContent=km.toLocaleString('es-AR');
}
function quitarSim(i){simParadas.splice(i,1);renderSimParadas();dibujarSimMapa()}
function limpiarSim(){simParadas=[];if(gDirRS)gDirRS.setDirections({routes:[]});renderSimParadas()}
function dibujarSimMapa(){
  if(!gMapSim)return;
  if(simParadas.length){const b=new google.maps.LatLngBounds();b.extend({lat:FLT,lng:FLN});simParadas.forEach(p=>b.extend({lat:p.lat,lng:p.lng}));gMapSim.fitBounds(b)}
}
function calcularRutaSim(){
  if(!simParadas.length||!gDir){toast('Agregá paradas primero');return}
  const last=simParadas[simParadas.length-1];
  gDir.route({
    origin:{lat:FLT,lng:FLN},destination:{lat:last.lat,lng:last.lng},
    waypoints:simParadas.slice(0,-1).map(p=>({location:{lat:p.lat,lng:p.lng},stopover:true})),
    travelMode:google.maps.TravelMode.DRIVING
  },(result,status)=>{
    if(status==='OK'){
      gDirRS.setDirections(result);
      const km=Math.round(result.routes[0].legs.reduce((s,l)=>s+l.distance.value,0)/1000);
      document.getElementById('simKm').textContent=km.toLocaleString('es-AR');
      toast(`Ruta real: ${km.toLocaleString('es-AR')} km ✔`);
    }else toast('Error: '+status);
  });
}

function renderClientes(){
  const m={};ventas.forEach(v=>{if(!m[v.cliente])m[v.cliente]={n:v.cliente,tel:v.telefono,cuit:v.cuit,vs:[]};m[v.cliente].vs.push(v)});
  const lista=Object.values(m).sort((a,b)=>a.n.localeCompare(b.n));
  document.getElementById('cliList').innerHTML=lista.map(c=>`<div class="cli-item${cliSel===c.n?' sel':''}" onclick="verCli('${c.n.replace(/'/g,"\\'")}')"><div class="cli-name">${c.n}</div>${c.tel?`<div class="cli-tel">📞 ${c.tel}</div>`:''}<div class="cli-cnt">${c.vs.length} venta${c.vs.length!==1?'s':''}</div></div>`).join('');
  if(cliSel)verCli(cliSel);
}
function verCli(nombre){
  cliSel=nombre;
  document.querySelectorAll('.cli-item').forEach(el=>el.classList.toggle('sel',el.querySelector('.cli-name')?.textContent===nombre));
  const cvs=ventas.filter(v=>v.cliente===nombre);
  const tel=cvs[0]?.telefono||'',cuit=cvs[0]?.cuit||'';
  const total=cvs.reduce((s,v)=>s+(v.precio||0),0);
  const ent=cvs.filter(v=>v.estado==='Entregado').length;
  document.getElementById('cliDetail').innerHTML=`
    <div class="cd-name">${nombre}</div>
    <div style="margin-top:4px;margin-bottom:14px;display:flex;flex-direction:column;gap:4px">
      ${tel?`<div style="color:#5ab8ff;font-size:.85rem">📞 <a href="tel:${tel}" style="color:#5ab8ff;text-decoration:none">${tel}</a> <button class="bg" style="padding:3px 10px;font-size:.72rem;margin-left:6px" onclick="wa('${tel}')">WhatsApp</button></div>`:''}
      ${cuit?`<div style="color:#7a9ab8;font-size:.78rem">CUIT: ${cuit}</div>`:''}
      <button class="bd" style="width:fit-content;font-size:.73rem;padding:4px 12px;margin-top:4px" onclick="editarUltimaVenta('${nombre.replace(/'/g,"\\'")}')">✎ Editar cliente</button>
    </div>
    <div class="cd-stats">
      <div class="cd-stat"><div class="cd-sv">${cvs.length}</div><div class="cd-sl">ventas</div></div>
      <div class="cd-stat"><div class="cd-sv">${ent}</div><div class="cd-sl">entregadas</div></div>
      ${total>0?`<div class="cd-stat"><div class="cd-sv">$${total.toLocaleString('es-AR')}</div><div class="cd-sl">facturado</div></div>`:''}
    </div>
    <div style="font-size:.72rem;font-weight:700;color:#5a7a9a;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Historial</div>
    ${cvs.map(v=>{const ei=Math.max(0,ESTADOS.indexOf(v.estado));const f=v.created_at?new Date(v.created_at).toLocaleDateString('es-AR',{day:'2-digit',month:'short',year:'numeric'}):'';return `<div class="cd-vrow"><div style="flex:1;min-width:0"><div style="font-weight:700;font-size:.83rem">${v.producto==='a'?'Silo Aéreo':'Autoconsumo'}${v.modelo?' · '+v.modelo:''}</div><div style="font-size:.72rem;color:#7a9ab8">${v.localidad||''}${v.zona?' · '+v.zona:''}${f?' · '+f:''}</div>${v.notas?`<div style="font-size:.7rem;color:#f0c040;margin-top:2px">${v.notas}</div>`:''}</div><div style="text-align:right;flex-shrink:0"><span class="${ECLASES[ei]} etag">${v.estado}</span>${v.precio?`<div style="font-size:.8rem;font-weight:700;color:#c9a840;margin-top:4px">$${Number(v.precio).toLocaleString('es-AR')}</div>`:''}</div></div>`}).join('')}`;
}
function editarUltimaVenta(n){const cvs=ventas.filter(v=>v.cliente===n);if(!cvs.length)return;abrirEditar(cvs[0].id)}

function wa(tel){if(!tel){alert('Sin teléfono');return}window.open('https://wa.me/54'+tel.replace(/\D/g,''),'_blank')}
function dk(a,b,c,d){const R=6371,r=Math.PI/180,dL=(c-a)*r,dl=(d-b)*r,x=Math.sin(dL/2)**2+Math.cos(a*r)*Math.cos(c*r)*Math.sin(dl/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5)}
function norm(s){return(s||'').toLowerCase().trim().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,' ')}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.opacity='1';clearTimeout(t._t);t._t=setTimeout(()=>t.style.opacity='0',2500)}

cargarVentas();
</script>
</body>
</html>
